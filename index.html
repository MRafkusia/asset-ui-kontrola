document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n  --card-border: rgba(226, 87, 22, 0.28);\n  --card-border-soft: rgba(36, 31, 32, 0.08);\n  --nav-bg: #ffffff;\n  --text: #241F20;\n  --text-muted: #6c6766;\n  --text-faint: #9a9594;\n  --pill-bg: #ffffff;\n  --pill-inactive: #2c2728;\n  --field-bg: #ffffff;\n  --field-border: rgba(36, 31, 32, 0.14);\n  --row-hover: #fbf3ef;\n  --row-border: rgba(36, 31, 32, 0.07);\n  --thead-bg: #faf8f7;\n  --grid-line: rgba(36,31,32,.07);\n\n  /* ---- Monitoring-tool brand accents (data-source badges) ---- */\n  --tool-zabbix: #d31212;\n  --tool-datadog: #7b40c6;\n  --tool-librenms: #108a72;\n  --tool-smokeping: #2d6fd6;\n\n  /* ---- Link/secondary accent used for \"downlink\" role ---- */\n  --link-blue: #2d6fd6;\n}\n\n[data-theme=\"dark\"] {\n  --page-bg: #171314;\n  --card-bg: #221d1e;\n  --card-border: rgba(226, 87, 22, 0.34);\n  --card-border-soft: rgba(255, 255, 255, 0.07);\n  --nav-bg: #221d1e;\n  --text: #F0EBEB;\n  --text-muted: #a39d9c;\n  --text-faint: #797373;\n  --pill-bg: #2c2627;\n  --pill-inactive: #d9d3d2;\n  --field-bg: #1c1819;\n  --field-border: rgba(255, 255, 255, 0.12);\n  --row-hover: #2a2324;\n  --row-border: rgba(255, 255, 255, 0.06);\n  --thead-bg: #1d191a;\n  --grid-line: rgba(255,255,255,.06);\n\n  --good: #34c578;\n  --good-bg: rgba(52,197,120,.16);\n  --bad: #ef5b4d;\n  --bad-bg: rgba(239,91,77,.16);\n  --warn: #eaa53a;\n  --warn-bg: rgba(234,165,58,.18);\n}\n<\u002Fstyle>\n  <style>/* ===========================================================\n   Kontrola — Typography tokens\n   Typeface: Arimo (web fallback for Swiss 721 BT / Helvetica)\n   Loaded from Google Fonts CDN — see fonts/fonts.css\n   =========================================================== */\n\n:root {\n  --font-body: 'Arimo', 'Helvetica Neue', Helvetica, Arial, sans-serif;\n  --font-mono: 'Arimo', monospace; /* tabular figures — the product has no distinct mono face */\n\n  /* ---- Type scale, taken verbatim from styles.css ---- */\n  --text-2xs: 10.5px;   /* micro labels, uppercase eyebrow tags */\n  --text-xs: 11.5px;    /* badges, table headers, chips */\n  --text-sm: 12.5px;    /* sub-labels, captions */\n  --text-base: 14px;    /* table cells, buttons, inputs */\n  --text-body: 15px;    /* body copy (base font-size on <body>) */\n  --text-md: 16px;\n  --text-lg: 19px;      /* section h2 (smaller) */\n  --text-xl: 21px;      /* card/table titles */\n  --text-2xl: 26px;     /* device hero h1 */\n  --text-3xl: 30px;     /* summary stat value */\n  --text-4xl: 33px;     /* metric card big value */\n\n  --leading-tight: 1.1;\n  --leading-snug: 1.2;\n  --leading-normal: 1.45;   /* body line-height */\n  --leading-relaxed: 1.5;\n\n  --tracking-tight: -.02em;   /* headings / big numbers */\n  --tracking-tighter: -.022em;\n  --tracking-normal: 0;\n  --tracking-wide: .01em;\n  --tracking-wider: .04em;    /* uppercase eyebrow / table header */\n  --tracking-widest: .07em;   /* metric-card m-label */\n\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n}\n<\u002Fstyle>\n  <style>/* ===========================================================\n   Kontrola — Spacing, radius & layout tokens\n   =========================================================== */\n\n:root {\n  /* ---- Spacing scale (from observed paddings/gaps in styles.css) ---- */\n  --space-1: 4px;\n  --space-2: 6px;\n  --space-3: 8px;\n  --space-4: 10px;\n  --space-5: 12px;\n  --space-6: 14px;\n  --space-7: 16px;\n  --space-8: 18px;\n  --space-9: 20px;\n  --space-10: 22px;\n  --space-11: 24px;\n  --space-12: 28px;\n\n  /* ---- Radii ---- */\n  --radius-sm: 6px;     /* small chips inner elements */\n  --radius-md: 9px;     /* seg-btn, thead-adjacent controls */\n  --radius-lg: 11px;    /* inputs, selects, buttons */\n  --radius-xl: 13px;    /* popovers, dropdown menus */\n  --radius-2xl: 14px;   /* hero chips, dev-hero badges */\n  --radius-3xl: 16px;   /* scope bar */\n  --radius-4xl: 20px;   /* .card default radius */\n  --radius-5xl: 22px;   /* modal */\n  --radius-full: 999px; /* pills, nav, badges, buttons */\n\n  /* ---- Layout ---- */\n  --page-max-width: 1320px;\n  --page-padding: 22px 28px 80px;\n\n  /* ---- Shadows ---- */\n  --shadow-card: 0 1px 2px rgba(36,31,32,.04), 0 8px 24px rgba(36,31,32,.05);\n  --shadow-pop: 0 12px 40px rgba(36,31,32,.18);\n  --shadow-cta: 0 6px 18px rgba(226,87,22,.32);\n  --shadow-btn: 0 6px 16px rgba(226,87,22,.28);\n}\n\n[data-theme=\"dark\"] {\n  --shadow-card: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);\n  --shadow-pop: 0 18px 50px rgba(0,0,0,.55);\n}\n<\u002Fstyle>\n  <style>/* ===========================================================\n   Kontrola — base reset & body defaults\n   =========================================================== */\n* { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { -webkit-text-size-adjust: 100%; }\nbody {\n  font-family: var(--font-body);\n  background: var(--page-bg);\n  color: var(--text);\n  font-size: var(--text-body);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  transition: background .35s ease, color .35s ease;\n  min-height: 100vh;\n}\n.wrap { max-width: var(--page-max-width); margin: 0 auto; padding: var(--page-padding); }\n\n/* shared card shell used across components/UI kits */\n.card {\n  background: var(--card-bg);\n  border: 1.5px solid var(--card-border);\n  border-radius: var(--radius-4xl);\n  box-shadow: var(--shadow-card);\n}\n<\u002Fstyle>\n  <style>/* Kontrola design system — global stylesheet entry point.\n   Keep this file as import-only; add new token files here. */\n/* ===========================================================\n   Kontrola — Webfont loading\n   The product itself never self-hosts Arimo — every screen links\n   Google Fonts directly (see index.html / device.html <link> tags).\n   We follow the same approach here rather than vendoring binaries\n   that the source project doesn't ship.\n   ======= U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Explicit @font-face (regular weight) so tooling that only reads local CSS,\n   not the imported stylesheet, still resolves a usable Arimo binary. The\n   @import above is what actually supplies weights 500/600/700 in a browser. */\n@font-face {\n  font-family: 'Arimo';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"9b904572-2ef4-4706-9032-cf4b8b942adf\") format('truetype');\n}\n\n/* ===========================================================\n   Kontrola — Color tokens\n   Source of truth: network-ui-kontrola/styles.css :root block\n   Palette: Orange #E25716 / Ink #241F20 / White #FFFFFF /\n            Light #F0EBEB / Gray #515151\n   =========================================================== */\n\n:root {\n  /* ---- Base brand palette ---- */\n  --orange: #E25716;\n  --orange-600: #c8480f;\n  --orange-050: #fdf0e9;\n  --ink: #241F20;\n  --white: #FFFFFF;\n  --light: #F0EBEB;\n  --gray: #515151;\n\n  /* ---- Semantic status ---- */\n  --good: #1f9d57;\n  --good-bg: rgba(31,157,87,.12);\n  --bad: #d8392b;\n  --bad-bg: rgba(216,57,43,.12);\n  --warn: #d98a16;\n  --warn-bg: rgba(217,138,22,.14);\n\n  /* ---- Semantic — Light theme (default) ---- */\n  --page-bg: #f3f0ef;\n  --card-bg: #ffffff;\n  --card-border: rgba(226, 87, 22, 0.28);\n  --card-border-soft: rgba(36, 31, 32, 0.08);\n  --nav-bg: #ffffff;\n  --text: #241F20;\n  --text-muted: #6c6766;\n  --text-faint: #9a9594;\n  --pill-bg: #ffffff;\n  --pill-inactive: #2c2728;\n  --field-bg: #ffffff;\n  --field-border: rgba(36, 31, 32, 0.14);\n  --row-hover: #fbf3ef;\n  --row-border: rgba(36, 31, 32, 0.07);\n  --thead-bg: #faf8f7;\n  --grid-line: rgba(36,31,32,.07);\n\n  /* ---- Monitoring-tool brand accents (data-source badges) ---- */\n  --tool-zabbix: #d31212;\n  --tool-datadog: #7b40c6;\n  --tool-librenms: #108a72;\n  --tool-smokeping: #2d6fd6;\n\n  /* ---- Link/secondary accent used for \"downlink\" role ---- */\n  --link-blue: #2d6fd6;\n}\n\n[data-theme=\"dark\"] {\n  --page-bg: #171314;\n  --card-bg: #221d1e;\n  --card-border: rgba(226, 87, 22, 0.34);\n  --card-border-soft: rgba(255, 255, 255, 0.07);\n  --nav-bg: #221d1e;\n  --text: #F0EBEB;\n  --text-muted: #a39d9c;\n  --text-faint: #797373;\n  --pill-bg: #2c2627;\n  --pill-inactive: #d9d3d2;\n  --field-bg: #1c1819;\n  --field-border: rgba(255, 255, 255, 0.12);\n  --row-hover: #2a2324;\n  --row-border: rgba(255, 255, 255, 0.06);\n  --thead-bg: #1d191a;\n  --grid-line: rgba(255,255,255,.06);\n\n  --good: #34c578;\n  --good-bg: rgba(52,197,120,.16);\n  --bad: #ef5b4d;\n  --bad-bg: rgba(239,91,77,.16);\n  --warn: #eaa53a;\n  --warn-bg: rgba(234,165,58,.18);\n}\n\n/* ===========================================================\n   Kontrola — Typography tokens\n   Typeface: Arimo (web fallback for Swiss 721 BT / Helvetica)\n   Loaded from Google Fonts CDN — see fonts/fonts.css\n   =========================================================== */\n\n:root {\n  --font-body: 'Arimo', 'Helvetica Neue', Helvetica, Arial, sans-serif;\n  --font-mono: 'Arimo', monospace; /* tabular figures — the product has no distinct mono face */\n\n  /* ---- Type scale, taken verbatim from styles.css ---- */\n  --text-2xs: 10.5px;   /* micro labels, uppercase eyebrow tags */\n  --text-xs: 11.5px;    /* badges, table headers, chips */\n  --text-sm: 12.5px;    /* sub-labels, captions */\n  --text-base: 14px;    /* table cells, buttons, inputs */\n  --text-body: 15px;    /* body copy (base font-size on <body>) */\n  --text-md: 16px;\n  --text-lg: 19px;      /* section h2 (smaller) */\n  --text-xl: 21px;      /* card/table titles */\n  --text-2xl: 26px;     /* device hero h1 */\n  --text-3xl: 30px;     /* summary stat value */\n  --text-4xl: 33px;     /* metric card big value */\n\n  --leading-tight: 1.1;\n  --leading-snug: 1.2;\n  --leading-normal: 1.45;   /* body line-height */\n  --leading-relaxed: 1.5;\n\n  --tracking-tight: -.02em;   /* headings / big numbers */\n  --tracking-tighter: -.022em;\n  --tracking-normal: 0;\n  --tracking-wide: .01em;\n  --tracking-wider: .04em;    /* uppercase eyebrow / table header */\n  --tracking-widest: .07em;   /* metric-card m-label */\n\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n}\n\n/* ===========================================================\n   Kontrola — Spacing, radius & layout tokens\n   =========================================================== */\n\n:root {\n  /* ---- Spacing scale (from observed paddings/gaps in styles.css) ---- */\n  --space-1: 4px;\n  --space-2: 6px;\n  --space-3: 8px;\n  --space-4: 10px;\n  --space-5: 12px;\n  --space-6: 14px;\n  --space-7: 16px;\n  --space-8: 18px;\n  --space-9: 20px;\n  --space-10: 22px;\n  --space-11: 24px;\n  --space-12: 28px;\n\n  /* ---- Radii ---- */\n  --radius-sm: 6px;     /* small chips inner elements */\n  --radius-md: 9px;     /* seg-btn, thead-adjacent controls */\n  --radius-lg: 11px;    /* inputs, selects, buttons */\n  --radius-xl: 13px;    /* popovers, dropdown menus */\n  --radius-2xl: 14px;   /* hero chips, dev-hero badges */\n  --radius-3xl: 16px;   /* scope bar */\n  --radius-4xl: 20px;   /* .card default radius */\n  --radius-5xl: 22px;   /* modal */\n  --radius-full: 999px; /* pills, nav, badges, buttons */\n\n  /* ---- Layout ---- */\n  --page-max-width: 1320px;\n  --page-padding: 22px 28px 80px;\n\n  /* ---- Shadows ---- */\n  --shadow-card: 0 1px 2px rgba(36,31,32,.04), 0 8px 24px rgba(36,31,32,.05);\n  --shadow-pop: 0 12px 40px rgba(36,31,32,.18);\n  --shadow-cta: 0 6px 18px rgba(226,87,22,.32);\n  --shadow-btn: 0 6px 16px rgba(226,87,22,.28);\n}\n\n[data-theme=\"dark\"] {\n  --shadow-card: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);\n  --shadow-pop: 0 18px 50px rgba(0,0,0,.55);\n}\n\n/* ===========================================================\n   Kontrola — base reset & body defaults\n   =========================================================== */\n* { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { -webkit-text-size-adjust: 100%; }\nbody {\n  font-family: var(--font-body);\n  background: var(--page-bg);\n  color: var(--text);\n  font-size: var(--text-body);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  transition: background .35s ease, color .35s ease;\n  min-height: 100vh;\n}\n.wrap { max-width: var(--page-max-width); margin: 0 auto; padding: var(--page-padding); }\n\n/* shared card shell used across components/UI kits */\n.card {\n  background: var(--card-bg);\n  border: 1.5px solid var(--card-border);\n  border-radius: var(--radius-4xl);\n  box-shadow: var(--shadow-card);\n}\n\n<\u002Fstyle>\n  <script src=\"ad0d6c41-bd2c-4359-a48b-557f4476dd99\"><\u002Fscript>\n  <style>\n    body{margin:0;background:var(--page-bg);}\n    /* The DS only ships :root (light) + [data-theme=\"dark\"]. When the host sets\n       data-theme=\"dark\" on <html> (OS dark mode), those dark tokens cascade into\n       our wrapper and our data-theme=\"light\" has nothing to override with. Re-declare\n       the light tokens under [data-theme=\"light\"] so our in-app toggle always wins. */\n    [data-theme=\"light\"]{\n      --page-bg:#f3f0ef;--card-bg:#ffffff;--card-border:rgba(246,92,26,.28);--card-border-soft:rgba(36,31,32,.08);\n      --nav-bg:#ffffff;--text:#241F20;--text-muted:#6c6766;--text-faint:#9a9594;--pill-bg:#ffffff;--pill-inactive:#2c2728;\n      --field-bg:#ffffff;--field-border:rgba(36,31,32,.14);--row-hover:#fbf3ef;--row-border:rgba(36,31,32,.07);\n      --thead-bg:#faf8f7;--grid-line:rgba(36,31,32,.07);\n      --good:#1f9d57;--good-bg:rgba(31,157,87,.12);--bad:#d8392b;--bad-bg:rgba(216,57,43,.12);--warn:#d98a16;--warn-bg:rgba(217,138,22,.14);\n    }\n    @keyframes amcScan{0%{top:6%}50%{top:90%}100%{top:6%}}\n    @keyframes amcToast{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}\n    @keyframes amcPop{from{opacity:0;transform:translateY(6px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}\n    .amc-row-act:hover{background:var(--orange-050)!important;color:var(--orange)!important}\n    .amc-sug:hover{background:var(--row-hover)!important}\n    .amc-btn-pri:hover{background:var(--orange-600)!important}\n    .amc-btn-sec:hover{background:var(--row-hover)!important}\n    .amc-drop:hover{background:var(--orange-050)!important;border-color:rgba(246,92,26,.5)!important}\n\n    /* ============ RESPONSIVE ============ */\n    /* Tablet: charts drop to 2-up */\n    @media (max-width:1024px){\n      .amc-charts{grid-template-columns:1fr 1fr!important}\n    }\n    /* Small tablet / large phone */\n    @media (max-width:760px){\n      .amc-page{padding:16px 16px 72px!important}\n      .amc-charts{grid-template-columns:1fr!important}\n      /* every 2-column grid (form fields, detail rows, audit scope, photos) stacks */\n      [style*=\"grid-template-columns: 1fr 1fr\"]{grid-template-columns:1fr!important}\n      [style*=\"grid-template-columns: 1fr 1.3fr\"]{grid-template-columns:1fr!important}\n      /* audit-result 4-up stats become 2-up */\n      [style*=\"grid-template-columns: repeat(4, 1fr)\"]{grid-template-columns:1fr 1fr!important}\n    }\n    /* Phone */\n    @media (max-width:480px){\n      .amc-page{padding:12px 12px 64px!important}\n      /* tighten card padding so content isn't cramped against edges */\n      .amc-charts>div{padding:18px 16px!important}\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-theme=\"{{ theme }}\" style=\"--orange:#F65C1A;--orange-600:#D84E12;--orange-050:rgba(246,92,26,.1);min-height:100vh;background:var(--page-bg);color:var(--text);font-family:'Arimo',system-ui,-apple-system,sans-serif\">\n<div class=\"amc-page\" style=\"max-width:1320px;margin:0 auto;padding:22px 28px 90px\">\n\n  <!-- ============ HEADER ============ -->\n  <heade { a.sub }} · {{ a.lastNote }}<\u002Fspan><\u002Fspan>\n              <div style=\"display:flex;gap:6px;flex:none\">\n                <sc-for list=\"{{ a.states }}\" as=\"st\" hint-placeholder-count=\"4\">\n                  <button onclick=\"{{ st.onClick }}\" title=\"{{ st.title }}\" style=\"width:34px;height:34px;display:grid;place-items:center;border-radius:9px;cursor:pointer;border:1.5px solid {{ st.border }};background:{{ st.bg }};color:{{ st.fg }};transition:background .12s,color .12s\">{{ st.icon }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 26px;border-top:1px solid var(--row-border)\">\n          <div style=\"display:flex;align-items:center;gap:6px\">\n            <button class=\"amc-btn-sec\" onclick=\"{{ resetAudit }}\" style=\"font-family:inherit;font-size:13.5px;font-weight:600;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:8px 6px\">Reset<\u002Fbutton>\n            <button class=\"amc-btn-sec\" onclick=\"{{ downloadAuditLog }}\" style=\"display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:13.5px;font-weight:600;color:var(--text);background:var(--field-bg);border:1.5px solid var(--field-border);border-radius:10px;padding:8px 12px;cursor:pointer\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width:15px;height:15px\"><path d=\"M12 3v12m0 0 4-4m-4 4-4-4\"><\u002Fpath><path d=\"M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2\"><\u002Fpath><\u002Fsvg>Download history log<\u002Fbutton>\n          <\u002Fdiv>\n          <button class=\"amc-btn-pri\" onclick=\"{{ completeAudit }}\" style=\"font-family:inherit;font-size:14px;font-weight:700;color:#fff;background:var(--orange);border:none;border-radius:11px;padding:10px 20px;cursor:pointer;box-shadow:0 4px 12px rgba(246,92,26,.28)\">Complete &amp; log audit<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ---- RESULT VIEW ---- -->\n      <sc-if value=\"{{ auditResult }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:22px 26px 16px;border-bottom:1px solid var(--row-border)\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:14px\">\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <span style=\"width:42px;height:42px;flex:none;border-radius:999px;background:var(--good-bg);color:var(--good);display:grid;place-items:center\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width:22px;height:22px\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <div><h3 style=\"margin:0;font-size:19px;font-weight:700\">Audit logged<\u002Fh3><p style=\"margin:3px 0 0;font-size:12.5px;color:var(--text-muted)\">{{ resTitle }} · {{ resMeta }}<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ closeAuditResult }}\" style=\"width:34px;height:34px;flex:none;border-radius:9px;border:none;background:var(--field-bg);color:var(--text-muted);cursor:pointer;display:grid;place-items:center\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" style=\"width:18px;height:18px\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px\">\n            <sc-for list=\"{{ resStats }}\" as=\"rs\" hint-placeholder-count=\"4\">\n              <div style=\"border:1.5px solid var(--card-border-soft);border-radius:13px;padding:12px 14px\">\n                <div style=\"font-size:26px;font-weight:700;letter-spacing:-.02em;color:{{ rs.color }}\">{{ rs.value }}<\u002Fdiv>\n                <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text-faint);margin-top:1px\">{{ rs.label }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"max-height:38vh;overflow:auto;padding:14px 26px\">\n          <sc-if value=\"{{ resHasExceptions }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px\">Exceptions to follow up<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:7px\">\n              <sc-for list=\"{{ resExceptions }}\" as=\"e\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:12px;padding:9px 12px;border:1px solid var(--row-border);border-radius:11px\">\n                  <span style=\"flex:1;min-width:0\"><span style=\"display:block;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ e.name }}<\u002Fspan><span style=\"display:block;font-size:11.5px;color:var(--text-faint);font-variant-numeric:tabular-nums\">{{ e.tag }} · {{ e.location }}<\u002Fspan><\u002Fspan>\n                  <span style=\"display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap;color:{{ e.fg }};background:{{ e.bg }}\">{{ e.label }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ resNoExceptions }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;align-items:center;gap:10px;padding:14px 16px;border:1px solid var(--good-bg);background:var(--good-bg);border-radius:12px;color:var(--good);font-size:13.5px;font-weight:600\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width:18px;height:18px\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>All verified assets were found in place — no exceptions.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 26px;border-top:1px solid var(--row-border)\">\n          <button class=\"amc-btn-sec\" onclick=\"{{ closeAuditResult }}\" style=\"font-family:inherit;font-size:14px;font-weight:600;color:var(--text);background:var(--field-bg);border:1.5px solid var(--field-border);border-radius:11px;padding:10px 18px;cursor:pointer\">Done<\u002Fbutton>\n          <div style=\"display:flex;gap:10px\">\n            <button class=\"amc-btn-sec\" onclick=\"{{ exportAuditCsv }}\" style=\"display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:14px;font-weight:600;color:var(--text);background:var(--field-bg);border:1.5px solid var(--field-border);border-radius:11px;padding:10px 16px;cursor:pointer\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--text-muted)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width:16px;height:16px\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><\u002Fsvg>Export CSV<\u002Fbutton>\n            <button class=\"amc-btn-pri\" onclick=\"{{ exportAuditPdf }}\" style=\"display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:14px;font-weight:700;color:#fff;background:var(--orange);border:none;border-radius:11px;padding:10px 18px;cursor:pointer;box-shadow:0 4px 12px rgba(246,92,26,.28)\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width:16px;height:16px\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6M9 13h6M9 17h4\"><\u002Fpath><\u002Fsvg>Export PDF<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ TOAST ============ -->\n<sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:90;display:flex;align-items:center;gap:10px;background:var(--ink);color:#fff;border-radius:999px;padding:12px 20px;box-shadow:0 12px 34px rgba(20,16,17,.35);font-size:13.5px;font-weight:600;animation:amcToast .2s ease\">\n    <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--orange)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width:17px;height:17px\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>{{ toast }}\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.today = new Date('2026-07-05T00:00:00');\n    this.palette = ['#F65C1A', '#454f5e', '#2d6fd6', '#1f9d57', '#d98a16', '#9a5cc6', '#e0836a', '#7a8290'];\n    const assets = this.seed();\n    this.state = {\n      theme: 'light',\n      assets,\n      auditLog: this.seedLog(assets),\n      search: '', suggestOpen: false,\n      typeFilter: 'all', usageFilter: 'all', conditionFilter: 'all', locFilter: 'all',\n      sortKey: 'tag', sortDir: 1, perPage: '8', page: 1,\n      showForm: false, editingId: null, form: this.blank(), err: {},\n      showDetail: false, detailId: null,\n      showDelete: false, deleteId: null, deleteBy: '', deleteOtp: '', otpCode: null, deleteErr: '', replaceDraft: null, deleteReason: '',\n      submitBy: 'Rina Hapsari',\n      activityLog: this.seedActivity(assets),\n      showActivity: false,\n      showScan: false, showAudit: false, showExport: false, showAddMenu: false, showFilters: false,\n      showBulk: false, bulkText: '', bulkFileName: '',\n      showQr: false, qrId: null,\n      audit: {}, auditScope: 'all', auditor: 'Rina Hapsari', auditResult: null,\n      img: { condition: { scale: 1, rot: 0 }, owner: { scale: 1, rot: 0 } }, toast: null,\n      hoverSeg: null,\n      seq: 15,\n    };\n  }\n\n  // audit status metadata — the four physical-verification outcomes\n  auditStates() {\n    return [\n      { k: 'found',   label: 'Found',   fg: 'var(--good)', bg: 'var(--good-bg)', color: 'var(--good)', d: ['M20 6 9 17l-5-5'] },\n      { k: 'moved',   label: 'Wrong location', fg: '#2d6fd6', bg: 'rgba(45,111,214,.12)', color: '#2d6fd6', d: ['M12 21s-6-5.7-6-10a6 6 0 0 1 12 0c0 4.3-6 10-6 10z', 'M12 9v2'] },\n      { k: 'damaged', label: 'Damaged', fg: 'var(--warn)', bg: 'var(--warn-bg)', color: 'var(--warn)', d: ['M14.5 4.5a3.5 3.5 0 0 0-4.9 4.4L3 15.5V21h5.5l6.6-6.6a3.5 3.5 0 0 0 4.4-4.9l-2.6 2.6-2.8-.7-.7-2.8z'] },\n      { k: 'missing', label: 'Missing', fg: 'var(--bad)', bg: 'var(--bad-bg)', color: 'var(--bad)', d: ['M18 6 6 18M6 6l12 12'] },\n    ];\n  }\n  auditMeta(k) { return this.auditStates().find(s => s.k === k) || null; }\n\n  blank() {\n    return { name: '', tag: '', serial: '', type: 'Laptop', location: 'HQ - Floor 1', owner: '', usage: 'In Use', condition: 'Good', purchase: '', warranty: '', value: '', photoCondition: '', photoOwner: '' };\n  }\n\n  seed() {\n    // tag, name, type, location, owner, serial, usage, condition, purchase, warranty, value\n    const a = [\n      ['AST-0001', 'Dell Latitude 5540', 'Laptop', 'HQ - Floor 1', 'Andi Pratama', '5CG3K21X9M', 'In Use', 'Good', '2024-02-10', '2027-02-10', 18500000],\n      ['AST-0002', 'HP EliteDesk 800 G9', 'Desktop', 'HQ - Floor 2', 'Budi Santoso', 'CZC33210AB', 'In Use', 'Good', '2023-06-01', '2026-06-01', 12000000],\n      ['AST-0003', 'Dell UltraSharp U2723', 'Monitor', 'HQ - Floor 1', 'And
